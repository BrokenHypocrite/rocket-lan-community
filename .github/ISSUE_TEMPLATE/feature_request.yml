name: Feature request
description: Suggest a new capability or improvement.
title: "[Feature] "
labels: ["enhancement", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the suggestion!

        If you're not sure whether this is a fully-formed feature request or
        more of a half-formed idea, open it as a [Discussion → Ideas](../../discussions/new?category=ideas)
        instead, we can promote it to an issue if it firms up.

  - type: textarea
    id: problem
    attributes:
      label: What problem are you trying to solve?
      description: Describe the situation you find yourself in that the current app handles poorly or not at all. "I'm always..." or "When I try to..." are good starts.
      placeholder: When I'm hosting a session with 6 friends and one of them...
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: What would you like Rocket LAN to do?
      description: How would your ideal version of this work? UI placement, behavior, edge cases, go as concrete as you can.
    validations:
      required: true

  - type: dropdown
    id: audience
    attributes:
      label: Who benefits from this?
      multiple: true
      options:
        - Hosts running sessions
        - Players joining sessions
        - Map creators / Map Maker mode users
        - Streamers / content creators
        - First-time users
        - Power users / community organizers
        - Everyone
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives you've considered
      description: Other ways to solve the same problem, including workarounds you currently use, or features in other tools that handle this.

  - type: dropdown
    id: priority
    attributes:
      label: How important is this to you?
      options:
        - Nice-to-have / curious
        - Would meaningfully improve my use of Rocket LAN
        - Blocking, I can't use Rocket LAN well without it
    validations:
      required: true

  - type: textarea
    id: extras
    attributes:
      label: Anything else?
      description: Sketches, mockups, screenshots from other apps that do this well, all welcome.

  - type: checkboxes
    id: checks
    attributes:
      label: Sanity checks
      options:
        - label: I've searched existing issues and discussions for similar suggestions.
          required: true
        - label: I've described the underlying problem, not just my proposed solution.
          required: false
